name: CI
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "22"
          cache: true
      - run: vp install
      - run: vp check --fix
      - run: vp test
      - run: vp build
