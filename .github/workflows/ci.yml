name: CI
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "22"
          cache: true
      - run: vp install
      - run: vp check --fix
      - run: vp test
      - run: vp build
