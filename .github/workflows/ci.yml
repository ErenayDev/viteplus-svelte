name: CI
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@4a524139920f87f9f7080d3b8545acac019e1852
        with:
          node-version: "22"
          cache: true
      - run: vp install
      - run: ls -la src/
      - run: vp check --fix
      - run: vp test
      - run: vp build
