name: CI
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@e1609b468742ba9232ce5e12b3a77bdf14495277 # v1.1.0
        with:
          node-version: "22"
          cache: true
      - run: vp install
      - run: ls -la src/
      - run: vp check --fix
      - run: vp test
      - run: vp build
