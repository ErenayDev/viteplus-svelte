name: CI
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: voidzero-dev/setup-vp@4a524139920f87f9f7080d3b8545acac019e1852
        with:
          node-version: "22"
          cache: true
      - run: vp install
      - run: vp check
      - run: vp test
      - run: vp build
