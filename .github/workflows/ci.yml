name: CI
on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          node-version: "22"
          cache: true
      - run: vp install
      - run: vp check --fix
      - run: vp test
      - run: vp build
